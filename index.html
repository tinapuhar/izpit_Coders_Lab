<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Izpit Coders lab John Smith</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header"> 
            <img src="images/Logo.png" alt="logo">
            <nav class="header__nav">
                <ul class="header__nav-list">
                    <li class="header__nav-list-item">about</li>
                    <li class="header__nav-list-item">experience</li>
                    <li class="header__nav-list-item">skill</li>
                    <li class="header__nav-list-item">portfolio</li>
                    <li class="header__nav-list-item">contact</li>
                </ul>
            </nav> <!-- e: header__nav -->
        </header> <!-- e:header -->
        <main class="main"> 
            <img src="images/hero-picture.png" alt="picture">
            <h1 class="title__name">John <span>Smith</span></h1>
            <p class="title__text">I design and build things on internet.</p>
        </main> <!-- e:main -->
        <section class="section">
            <h2 class="contact">Contact</h2> 
            <p class="contact__text">I am currently seeking employment, so if you have a job or project offer, or if you need more information, please do not hesitate to contact me.</p>
            <a class="btn">Write message</a>
            <div class="social">
             <img src="images/socmed-icons.png" alt="logo_text">
            </div>
        </section> <!-- e:section -->
        <footer class="footer">
            <p>John <span>Smith</span> - 2023</p> 
        </footer> <!-- e:footer -->
    </div> <!-- e:footer/container -->
</body>
</html>
